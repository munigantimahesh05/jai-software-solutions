# Netlify Configuration for JAI Software Solutions

[build]
  command = "npm install && npm run build"
  functions = "netlify/functions"
  publish = ".next"

# Cache settings
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
